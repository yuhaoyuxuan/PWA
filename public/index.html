<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icon-192.png">
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script src="./scripts/config-loader.js"></script>
  <script>
    (async function() {
      // Redirect guard: prevent loop if already redirected
      if (sessionStorage.getItem('__pwa_routed')) return;
      sessionStorage.setItem('__pwa_routed', '1');

      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      const wasLaunched = localStorage.getItem('__pwa_launched');
      const currentPath = window.location.pathname;
      const baseDir = currentPath.replace(/\/[^/]*$/, '');
      const installPath = baseDir + '/install.html';

      if (isStandalone || wasLaunched) {
        localStorage.setItem('__pwa_launched', '1');
        try {
          const config = await configLoader.load();
          const startUrl = config.app.start_url || './app.html';
          if (currentPath !== startUrl && currentPath !== installPath) {
            window.location.replace(startUrl);
          }
        } catch {
          // Already on /, do nothing
        }
      } else {
        if (currentPath !== installPath) {
          const params = new URLSearchParams(window.location.search);
          if (!params.has('returnUrl')) {
            params.set('returnUrl', currentPath + window.location.search);
          }
          window.location.replace('./install.html?' + params.toString());
        }
      }
    })();
  </script>
</body>
</html>
