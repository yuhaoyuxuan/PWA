<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <title>My PWA App</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./styles/variables.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--pwa-bg, #0f172a);
      color: var(--pwa-text, #f8fafc);
      font-family: var(--pwa-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .welcome { max-width: 360px; }
    .welcome-icon {
      width: 80px; height: 80px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .welcome h1 { font-size: 24px; margin: 0 0 8px; }
    .welcome p { font-size: 14px; color: var(--pwa-text-secondary, #94a3b8); line-height: 1.6; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--pwa-success, #10b981) 15%, transparent);
      color: var(--pwa-success, #10b981);
      font-size: 12px;
      font-weight: 600;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="welcome">
    <img id="appIcon" class="welcome-icon" src="./assets/icons/icon-512.png" alt="App">
    <h1 id="appName">My PWA App</h1>
    <p>App instalado com sucesso<br>Esta é a página de destino de exemplo</p>
    <div class="badge">PWA Ready</div>
  </div>
  <script src="./scripts/config-loader.js"></script>
  <script src="./scripts/sw-register.js"></script>
  <script>
    (async function() {
      try {
        const config = await configLoader.load();
        document.getElementById('appName').textContent = config.app.name;
        document.getElementById('appIcon').src = config.installPage.icon;
        document.title = config.app.name;
      } catch(e) {}
    })();
  </script>
</body>
</html>
